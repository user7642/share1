<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Máy tính & Uppercase/Lowercase Console</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: monospace;
      margin: 0;
      background: #f0f0f0;
      padding: 10px;
    }

    details {
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    summary {
      padding: 10px;
      font-weight: bold;
      background: #e9e9e9;
      cursor: pointer;
      border-bottom: 1px solid #ccc;
    }

    .output {
      max-height: 40vh;
      overflow-y: auto;
      padding: 10px;
      white-space: pre-wrap;
    }

    .line {
      display: flex;
      flex-direction: column;
      margin-bottom: 10px;
    }

    .input-line {
      color: #333;
    }

    .output-line {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 10px;
    }

    .result-text {
      color: #007acc;
      user-select: text;
      flex: 1;
    }

    .copy-btn {
      font-size: 0.8em;
      padding: 2px 6px;
      border: 1px solid #888;
      background-color: #e0e0e0;
      border-radius: 3px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background-color: #d0d0d0;
    }

    input[type="text"], textarea {
      border: none;
      border-top: 1px solid #ccc;
      padding: 8px;
      font-family: inherit;
      font-size: 1em;
      width: 100%;
      resize: vertical;
    }

    textarea {
      min-height: 60px;
    }

    @media (max-width: 425px) {
      .output {
        max-height: 30vh;
      }
    }
  </style>
</head>
<body>

  <!-- Máy tính -->
  <details open>
    <summary>Máy tính</summary>
    <div id="calcOutput" class="output"></div>
    <input type="text" id="calcInput" placeholder="Nhập biểu thức, ví dụ: 1+2 và nhấn Enter">
  </details>

  <!-- Uppercase -->
  <details open>
    <summary>Chuyển sang IN HOA</summary>
    <div id="upperOutput" class="output"></div>
    <textarea id="upperInput" placeholder="Gõ chữ thường hoặc dán nhiều dòng và nhấn Enter"></textarea>
  </details>

  <!-- Lowercase -->
  <details open>
    <summary>Chuyển sang chữ thường</summary>
    <div id="lowerOutput" class="output"></div>
    <textarea id="lowerInput" placeholder="Gõ chữ HOA hoặc dán nhiều dòng và nhấn Enter"></textarea>
  </details>

  <script>
    // ====== Máy tính ======
    const calcInput = document.getElementById('calcInput');
    const calcOutput = document.getElementById('calcOutput');

    calcInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const expr = calcInput.value.trim();
        if (!expr) return;
        let result;
        try {
          result = eval(expr);
        } catch {
          result = 'Lỗi cú pháp';
        }

        const line = document.createElement('div');
        line.className = 'line';

        const inputLine = document.createElement('div');
        inputLine.textContent = '> ' + expr;
        inputLine.className = 'input-line';

        const outputLine = document.createElement('div');
        outputLine.className = 'output-line';

        const resultText = document.createElement('div');
        resultText.textContent = '< ' + result;
        resultText.className = 'result-text';

        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Sao chép';
        copyBtn.className = 'copy-btn';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(result.toString()).then(() => {
            copyBtn.textContent = 'Đã sao chép!';
            setTimeout(() => copyBtn.textContent = 'Sao chép', 1500);
          });
        };

        outputLine.appendChild(resultText);
        outputLine.appendChild(copyBtn);

        line.appendChild(inputLine);
        line.appendChild(outputLine);
        calcOutput.appendChild(line);

        calcInput.value = '';
        calcOutput.scrollTop = calcOutput.scrollHeight;
      }
    });

    // ====== Uppercase ======
    const upperInput = document.getElementById('upperInput');
    const upperOutput = document.getElementById('upperOutput');

    upperInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = upperInput.value.trim();
        if (!text) return;

        const upper = text.split('\n').map(line => line.toUpperCase()).join('\n');

        const lineEl = document.createElement('div');
        lineEl.className = 'line';

        const inputLine = document.createElement('div');
        inputLine.textContent = '> ' + text;
        inputLine.className = 'input-line';

        const outputLine = document.createElement('div');
        outputLine.className = 'output-line';

        const resultText = document.createElement('div');
        resultText.textContent = '< ' + upper;
        resultText.className = 'result-text';

        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Sao chép';
        copyBtn.className = 'copy-btn';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(upper).then(() => {
            copyBtn.textContent = 'Đã sao chép!';
            setTimeout(() => copyBtn.textContent = 'Sao chép', 1500);
          });
        };

        outputLine.appendChild(resultText);
        outputLine.appendChild(copyBtn);

        lineEl.appendChild(inputLine);
        lineEl.appendChild(outputLine);
        upperOutput.appendChild(lineEl);

        upperInput.value = '';
        upperOutput.scrollTop = upperOutput.scrollHeight;
      }
    });

    // ====== Lowercase ======
    const lowerInput = document.getElementById('lowerInput');
    const lowerOutput = document.getElementById('lowerOutput');

    lowerInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = lowerInput.value.trim();
        if (!text) return;

        const lower = text.split('\n').map(line => line.toLowerCase()).join('\n');

        const lineEl = document.createElement('div');
        lineEl.className = 'line';

        const inputLine = document.createElement('div');
        inputLine.textContent = '> ' + text;
        inputLine.className = 'input-line';

        const outputLine = document.createElement('div');
        outputLine.className = 'output-line';

        const resultText = document.createElement('div');
        resultText.textContent = '< ' + lower;
        resultText.className = 'result-text';

        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Sao chép';
        copyBtn.className = 'copy-btn';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(lower).then(() => {
            copyBtn.textContent = 'Đã sao chép!';
            setTimeout(() => copyBtn.textContent = 'Sao chép', 1500);
          });
        };

        outputLine.appendChild(resultText);
        outputLine.appendChild(copyBtn);

        lineEl.appendChild(inputLine);
        lineEl.appendChild(outputLine);
        lowerOutput.appendChild(lineEl);

        lowerInput.value = '';
        lowerOutput.scrollTop = lowerOutput.scrollHeight;
      }
    });
  </script>
</body>
</html>
