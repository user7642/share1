    <script>
        var key = "MyNotes";
        function get_clear() {
            document.getElementById("name-apps").value = "";

            document.getElementById("app-content").value = "";
        }
        function getfilename() {
            const now = new Date();
            const year = now.getYear()
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const Seconds = now.getSeconds()
            const Milliseconds = now.getMilliseconds()

            return filename = `🗓️:${day}-${month}-${hours}:${minutes}:${Seconds}`;

        }

        function getitem(key) {
            item = localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : [];
            return item;
        }

        function setitem(key, value) {
            localStorage.setItem(key, JSON.stringify(value))

        }

        function edititem(i) {
            item = getitem(key);
            document.querySelector('#item-index').value = i;
            document.querySelector('#name-apps').value = i + " " + item[i].name;
            document.querySelector('#app-content').value = item[i].content;
            closeNav();

        }
        function updateitem() {
            i = document.querySelector('#item-index').value;
            item = getitem(key);
            item[i] = {
                "name": document.querySelector('#name-apps').value,
                "content": document.querySelector('#app-content').value,
            }
            setitem(key, item);
            openitem();

        }

        function openitem() {

            data = getitem(key);

            const _notes_items = data.map((e, i) => {
                return `
                <div id="item-name">
                    <div class="item-name">
                        <div class="item-name">
                            <div class="in-name" onclick="get_content(${i})">${e.name}<<${i}:</div>
                             <div class="menu-icon">
                            <div class="item-icon" onclick="edititem(${i})">📝</div>
                            <div class="item-icon" onclick="delete_item(${i})">❌</div>
                            </div>
                        </div>
                        
                    </div>
                    <div class="item-content"></div>
                    </div>
                <div id="item-content">${e.content}</div>
                `
            }).join("");

            _note_list = document.getElementById("note-list");
            _note_list.innerHTML = _notes_items;
        }
        function SaveNote() {
            _notes = getitem(key);
            _notes_value = document.getElementById("app-content").value;
            _file_name = document.getElementById("name-apps").value;

            if (_file_name === "") {
                _notes.push({ "name": getfilename(), "content": _notes_value })
            } else {
                _notes.push({ "name": _file_name, "content": _notes_value })
            }
            setitem(key, _notes);
        }

        function get_content(i) {
            c = document.querySelectorAll('#item-content');
            if (c[i].style.display === "none") {
                c[i].style.display = "block";
            } else {
                c[i].style.display = "none";
            }

        }

        function delete_item(i) {
            delitem = getitem(key);
            delitem.splice(i, 1);
            setitem(key, delitem);
            openitem();

        }
        function openNav() {
            openitem();
            document.getElementById("nav-pannel").style.width = "100%";
            document.querySelector(".overlay").style.display = "block";
            document.querySelector(".closebtn").style.display = "block";
        }
        function closeNav() {
            document.getElementById("nav-pannel").style.width = "0";
            document.querySelector(".overlay").style.display = "none";
            document.querySelector(".closebtn").style.display = "none";
        }
    </script>
